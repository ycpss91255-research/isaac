# 3D LiDAR — Ouster OS1 Rev7 128ch 10Hz
# Uses NVIDIA pre-built RTX LiDAR profile (Isaac Sim 5.1+)

mount:
  parent_prim: "/World/Robot/base_link"
  pose:
    xyz: [0, 0, 0.5]
    rpy: [0, 0, 0]

sensor:
  category: lidar
  type: lidar_3d
  profile: "Ouster/OS1_Rev7_128ch_10Hz"

ros:
  topic_prefix: "/lidar_3d"
  frame_id_prefix: "lidar_3d"
  publish_type: "point_cloud"
